<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datamundi - First Class Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-[#fcfcfc] text-black dark:text-white min-h-screen pb-32 transition-colors">

    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3"></div>
    <header class="max-w-6xl mx-auto py-20 px-6 flex flex-col items-center relative">
        <div class="absolute top-10 right-6">
            <button onclick="toggleDarkMode()"
                class="flex items-center gap-2 px-5 py-2.5 bg-white dark:bg-neutral-900 border border-slate-200 dark:border-neutral-800 rounded-full shadow-sm text-[10px] font-black tracking-[0.2em] uppercase hover:shadow-md transition-all active:scale-95 light-mode-black">
                <i data-lucide="moon" id="moon-icon" class="w-3.5 h-3.5"></i>

                Vuelo Nocturno

            </button>

        </div>

        <div class="flex items-center gap-6 mb-4 group cursor-default">
            <div
                class="w-10 h-10 bg-amber-400 rotate-45 group-hover:rotate-[225deg] transition-transform duration-1000 shadow-lg">
            </div>
            <h1
                class="text-7xl md:text-8xl font-black tracking-tighter uppercase leading-none font-black light-mode-black transition-colors">
                Datamundi</h1>
        </div>

        <p class="text-[12px] font-black tracking-[0.6em] uppercase light-mode-black ml-6 transition-colors">First Class
            Global</p>

    </header>


    <main class="max-w-5xl mx-auto px-6">

        <!-- PESTAÑAS -->

        <div class="flex justify-center gap-12 mb-20 border-b border-slate-100 dark:border-neutral-900">
            <button onclick="switchTab('explorar')" id="tab-explorar"
                class="pb-6 text-[12px] font-black tracking-[0.3em] uppercase transition-all relative light-mode-black">

                Búsqueda

                <div class="indicator absolute bottom-0 left-0 w-full h-1 bg-amber-400"></div>
            </button>

            <button onclick="switchTab('favoritos')" id="tab-favoritos"
                class="pb-6 text-[12px] font-black tracking-[0.3em] uppercase transition-all relative light-mode-black opacity-40">

                Bitácora

                <div class="indicator absolute bottom-0 left-0 w-full h-1 bg-amber-400 hidden"></div>

            </button>

        </div>


        <!-- SECCIÓN: EXPLORAR -->

        <section id="section-explorar" class="space-y-12">
            <div
                class="bg-white dark:bg-neutral-950 p-10 md:p-14 rounded-sm shadow-xl border border-slate-100 dark:border-neutral-900 relative">
                <div class="absolute top-0 left-0 h-1.5 w-full bg-amber-400"></div>
                <h1 class="text-3xl mb-10 light-mode-black transition-colors">Destino global...</h1>
                <div class="flex flex-col md:flex-row gap-0 items-stretch">
                    <div class="flex-1 relative input-container p-5">
                        <input type="text" id="search-input" onkeypress="handleSearch(event)" placeholder="ej: mexico"
                            class="font-sans-ui w-full bg-transparent border-none outline-none text-2xl font-light py-1 text-black light-mode-black">
                    </div>
                    <button onclick="buscarPais()"
                        class="bg-amber-400 text-black px-12 py-5 font-black text-[12px] tracking-widest uppercase hover:bg-white hover:text-amber-600 transition-all active:scale-95 shadow-sm hover:shadow-lg">

                        ¡Descubre!

                    </button>

                </div>

            </div>

            <div id="search-result-container"></div>

        </section>


        <!-- SECCIÓN: FAVORITOS -->

        <section id="section-favoritos" class="hidden">
            <div id="fav-main-view">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-4">
                    <h3 class="text-7xl md:text-8xl font-serif leading-none light-mode-black">Favoritos</h3>
                    <span id="fav-counter"
                        class="bg-amber-400 text-black px-6 py-2 rounded-full text-[11px] font-black tracking-widest uppercase shadow-lg">

                        0 Destinos

                    </span>

                </div>

                <div id="fav-list" class="grid gap-4"></div>

            </div>

            <div id="fav-detail" class="hidden">

                <button onclick="cerrarDetalle()"
                    class="mb-10 flex items-center gap-3 light-mode-black opacity-80 hover:opacity-100 hover:text-amber-500 text-[11px] font-black uppercase tracking-[0.3em] transition-all">

                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver a favoritos

                </button>

                <div id="fav-detail-container"></div>

            </div>

        </section>

    </main>

    <!-- Vinculación de JS usando Flask -->

    <script src="{{ url_for('static', filename='js/javita.js') }}"></script>

</body>

</html>
